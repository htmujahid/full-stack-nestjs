<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/client/style.css" rel="stylesheet" />
    <title>Contact — crude</title>
  </head>
  <body class="min-h-screen antialiased">
    <header class="sticky top-0 z-50 w-full border-b border-border bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60">
      <div class="container mx-auto flex h-14 max-w-5xl items-center justify-between px-4 sm:px-6">
        <a href="/" class="text-lg font-semibold text-foreground">crude</a>
        <nav class="flex items-center gap-3" aria-label="Main navigation">
          <a
            href="/auth/sign-in"
            class="inline-flex h-8 items-center justify-center rounded-lg border border-border bg-background px-3 text-sm font-medium transition-colors hover:bg-muted hover:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
          >
            Sign in
          </a>
          <a
            href="/auth/sign-up"
            class="inline-flex h-8 items-center justify-center rounded-lg border border-transparent bg-primary px-3 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
          >
            Sign up
          </a>
        </nav>
      </div>
    </header>

    <main>
      <section class="py-16 sm:py-24" aria-labelledby="contact-heading">
        <div class="container mx-auto max-w-2xl px-4 sm:px-6">
          <h1 id="contact-heading" class="text-3xl font-bold tracking-tight text-foreground sm:text-4xl">
            Contact us
          </h1>
          <p class="mt-4 text-lg text-muted-foreground">
            Have a question or feedback? Reach out.
          </p>

          <form
            action="#"
            method="post"
            class="mt-12 space-y-6 rounded-xl border border-border bg-card px-6 py-8 ring-1 ring-foreground/10 sm:px-8"
          >
            <div>
              <label for="email" class="block text-sm font-medium text-card-foreground">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                autocomplete="email"
                class="mt-2 block w-full rounded-lg border border-input bg-background px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2"
                placeholder="you@example.com"
              />
            </div>
            <div>
              <label for="subject" class="block text-sm font-medium text-card-foreground">Subject</label>
              <input
                type="text"
                id="subject"
                name="subject"
                required
                class="mt-2 block w-full rounded-lg border border-input bg-background px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2"
                placeholder="What's this about?"
              />
            </div>
            <div>
              <label for="message" class="block text-sm font-medium text-card-foreground">Message</label>
              <textarea
                id="message"
                name="message"
                rows="5"
                required
                class="mt-2 block w-full resize-y rounded-lg border border-input bg-background px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2"
                placeholder="Your message..."
              ></textarea>
            </div>
            <button
              type="submit"
              class="inline-flex h-9 items-center justify-center rounded-lg border border-transparent bg-primary px-4 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
            >
              Send message
            </button>
          </form>

          <p class="mt-6 text-sm text-muted-foreground">
            This form is a placeholder. Wire it to your backend or a service like Formspree to handle submissions.
          </p>

          <div class="mt-12">
            <a
              href="/"
              class="inline-flex h-9 items-center justify-center rounded-lg border border-border bg-background px-4 text-sm font-medium transition-colors hover:bg-muted hover:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
            >
              Back to home
            </a>
          </div>
        </div>
      </section>
    </main>

    <footer class="border-t border-border bg-muted/30 py-8">
      <div class="container mx-auto max-w-5xl px-4 sm:px-6">
        <div class="flex flex-col items-center justify-between gap-4 sm:flex-row">
          <p class="text-sm text-muted-foreground">© crude</p>
          <nav class="flex items-center gap-6" aria-label="Footer navigation">
            <a href="/about" class="text-sm text-muted-foreground transition-colors hover:text-foreground">About</a>
            <a href="/contact" class="text-sm font-medium text-foreground">Contact</a>
          </nav>
        </div>
      </div>
    </footer>
  </body>
</html>
